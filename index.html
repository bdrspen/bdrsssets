<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bdrspen | 3D Orbital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

    <script type="importmap">
    {
        "imports": {
            "three":         "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --accent:    #17c9d1;
            --gold:      #ffd166;
            --glass:     rgba(6, 30, 42, 0.48);
            --icon-size: clamp(58px, 7.5vmin, 84px);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: #FFD93D;
            overflow: hidden;
            height: 100vh;
            font-family: 'Luckiest Guy', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
            transition: background 1.2s ease;
        }
        html.dark-theme body { background: #0b1a3a; }

        /* ── Three.js canvas: transparent, sits over the yellow bg ── */
        #threeCanvas { position:fixed; inset:0; z-index:1; display:block; }

        /* ══════════════════════════════════
           LOGO CIRCLE  (top-center)
        ══════════════════════════════════ */
        .orbit-logo {
            position: fixed;
            left: 50%; top: 13vh;
            transform: translate(-50%, -50%);
            width:  calc(var(--icon-size) * 1.55);
            height: calc(var(--icon-size) * 1.55);
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 2px solid var(--accent);
            box-shadow:
                0 0 28px rgba(23,201,209,0.4),
                inset 0 0 20px rgba(23,201,209,0.08);
            display: flex; align-items: center; justify-content: center;
            z-index: 20;
            animation: floatLogo 4s ease-in-out infinite;
        }
        .orbit-logo img {
            width: 62%; height: 62%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px var(--accent));
        }

        @keyframes floatLogo {
            0%,100% { transform: translate(-50%,-50%) translateY(0px);   }
            50%      { transform: translate(-50%,-50%) translateY(-10px); }
        }

        /* ══════════════════════════════════
           STARBURST  (behind logo, sticker style)
        ══════════════════════════════════ */
        .logo-starburst {
            position: fixed;
            left: 50%; top: 13vh;
            transform: translate(-50%, -50%);
            width:  calc(var(--icon-size) * 2.5);
            height: calc(var(--icon-size) * 2.5);
            z-index: 19;
            pointer-events: none;
            animation: spinStar 26s linear infinite;
        }
        .logo-starburst svg { width: 100%; height: 100%; }
        @keyframes spinStar { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ══════════════════════════════════
           SUN / MOON ORBIT  (circles the logo, swaps at night)
        ══════════════════════════════════ */
        .sky-orbit {
            position: fixed;
            left: 50%; top: 13vh;
            transform: translate(-50%, -50%);
            width:  calc(var(--icon-size) * 3.4);
            height: calc(var(--icon-size) * 3.4);
            z-index: 15;
            pointer-events: none;
            animation: orbitSpin 16s linear infinite;
        }
        .sky-icon {
            position: absolute;
            top: 0; left: 50%;
            width: 30px; height: 30px;
            transform: translate(-50%, -50%);
        }
        .sky-icon .sun,
        .sky-icon .moon {
            position: absolute; inset: 0;
            border-radius: 50%;
            transition: opacity 0.8s ease;
        }
        .sky-icon .sun {
            background: radial-gradient(circle at 35% 32%, #fff6c8, #ffd93d 55%, #ff9a2e 100%);
            box-shadow: 0 0 18px 6px rgba(255,214,61,0.65);
            opacity: 1;
        }
        .sky-icon .moon {
            background: radial-gradient(circle at 32% 30%, #f4f6ff, #cdd6e8 55%, #8f9bbd 100%);
            box-shadow: 0 0 16px 5px rgba(200,210,255,0.55);
            opacity: 0;
        }
        html.dark-theme .sky-icon .sun  { opacity: 0; }
        html.dark-theme .sky-icon .moon { opacity: 1; }

        @keyframes orbitSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ══════════════════════════════════
           SOCIAL BUTTON ROW  (bottom-center, above footer)
        ══════════════════════════════════ */
        .social-row {
            position: fixed;
            bottom: 78px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            z-index: 20;
        }
        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            background: none;
            color: #2D6CDF;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease, transform 0.25s ease;
        }
        .social-btn i { font-size: 1.05rem; }
        .social-btn:hover {
            color: #4CAF50;
            transform: translateY(-3px);
        }

        /* ══════════════════════════════════
           FOOTER
        ══════════════════════════════════ */
        .footer-tag {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        .footer-link {
            font-size: 0.62rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(0,0,0,0.5);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-link:hover { color: #2D6CDF; }

        html.dark-theme .social-btn    { color: #7fb8ff; }
        html.dark-theme .social-btn:hover { color: #4CAF50; }
        html.dark-theme .footer-link   { color: rgba(255,255,255,0.55); }
        html.dark-theme .footer-link:hover { color: #17c9d1; }

        /* ══════════════════════════════════
           MOBILE — portrait
        ══════════════════════════════════ */
        @media (max-width: 600px) {
            :root { --icon-size: clamp(50px, 14vw, 66px); }
            .orbit-logo   { top: 10vh; }
            .social-row   { bottom: 70px; gap: 10px; }
            .social-btn   { padding: 0.65rem 1rem; font-size: 0.72rem; }
        }

        /* ══════════════════════════════════
           MOBILE — landscape
        ══════════════════════════════════ */
        @media (max-height: 500px) and (orientation: landscape) {
            :root { --icon-size: clamp(42px, 8vmin, 58px); }
            .orbit-logo  { top: 12vh; }
            .social-row  { bottom: 46px; gap: 8px; }
            .social-btn  { padding: 0.5rem 0.85rem; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <!-- 3D model, centered -->
    <canvas id="threeCanvas"></canvas>

    <!-- ── Starburst (behind logo) ── -->
    <div class="logo-starburst">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <polygon
                fill="var(--gold)"
                stroke="#fff"
                stroke-width="3"
                points="100,4 116,58 168,34 142,84 196,92 144,110 172,158
                        118,142 100,196 82,142 28,158 56,110 4,92 58,84
                        32,34 84,58" />
        </svg>
    </div>

    <!-- ── Logo ── -->
    <div class="orbit-logo">
        <img src="https://i.postimg.cc/65KGqwDQ/IMG-1999-removebg-preview.png" alt="bdrspen">
    </div>

    <!-- ── Sun/Moon orbiting the logo ── -->
    <div class="sky-orbit">
        <div class="sky-icon">
            <div class="sun"></div>
            <div class="moon"></div>
        </div>
    </div>

    <!-- ── Social button row ── -->
    <div class="social-row">
        <a href="https://www.instagram.com/bdrspen/" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>

        <a href="https://www.pinterest.com/bdrspen/" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-pinterest"></i>
            <span>Pinterest</span>
        </a>

        <a href="https://www.tiktok.com/@bdrs_pen" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>
    </div>

    <footer class="footer-tag">
        <a href="mailto:workido997@gmail.com" class="footer-link">
            bader's p 2026 &middot; contact me here
        </a>
    </footer>

    <!-- Day / night theme check -->
    <script>
        function applyTimeTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.documentElement.classList.toggle('dark-theme', isNight);
        }
        applyTimeTheme();
        setInterval(applyTimeTheme, 60000);
    </script>

    <!-- ══════════════════════════════════════════════════
         THREE.JS  —  Blender model, centered
    ══════════════════════════════════════════════════ -->
    <script type="module">
        import * as THREE          from 'three';
        import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const canvas   = document.getElementById('threeCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.toneMapping         = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();

        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
        pmrem.dispose();

        const camera = new THREE.PerspectiveCamera(
            45, window.innerWidth / window.innerHeight, 0.1, 2000
        );
        camera.position.z = window.innerWidth < window.innerHeight ? 10 : 7;

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping   = true;
        controls.dampingFactor   = 0.04;
        controls.autoRotate      = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableZoom      = true;
        controls.minDistance     = 2.2;
        controls.maxDistance     = 18;
        controls.enablePan       = false;
        controls.touches         = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_ROTATE
        };

        let resumeTimer;
        controls.addEventListener('start', () => {
            controls.autoRotate = false;
            clearTimeout(resumeTimer);
        });
        controls.addEventListener('end', () => {
            resumeTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });

        const clock = new THREE.Clock();
        let mixer   = null;

        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            'https://raw.githubusercontent.com/bdrspen/bdrsssets/main/p1.glb',
            ({ scene: model, animations }) => {
                const box    = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);
                model.scale.setScalar(3.4 / Math.max(size.x, size.y, size.z));

                model.traverse(child => {
                    if (child.isMesh && child.material) {
                        const mats = Array.isArray(child.material)
                            ? child.material : [child.material];
                        mats.forEach(m => {
                            if (m.emissive && m.emissive.r + m.emissive.g + m.emissive.b > 0.01) {
                                m.emissiveIntensity = Math.min(m.emissiveIntensity * 2, 3);
                            }
                        });
                    }
                });

                scene.add(model);

                if (animations && animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    animations.forEach(clip => {
                        mixer.clipAction(clip).play();
                    });
                }
            },
            undefined,
            err => console.error('GLTF load error:', err)
        );

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>

</body>
</html>
