<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bdrspen | 3D Orbital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Danfo&display=swap" rel="stylesheet">

    <script type="importmap">
    {
        "imports": {
            "three":         "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --glass:     rgba(6, 30, 42, 0.48);
            --icon-size: clamp(58px, 7.5vmin, 84px);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: #FFD93D;
            overflow: hidden;
            height: 100vh;
            font-family: 'Danfo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
            transition: background 1.2s ease;
        }
        html.dark-theme body { background: #0b1a3a; }

        /* ── Three.js canvas: transparent, sits over the yellow bg ── */
        #threeCanvas {
            position:fixed; inset:0; z-index:1; display:block;
            transform-origin: top right;
            transition: transform 1s cubic-bezier(.22,1,.36,1);
            transform: scale(0.5);
        }
        html.is-home #threeCanvas { transform: scale(1); }

        /* ══════════════════════════════════
           LOGO CIRCLE  (top-center)
        ══════════════════════════════════ */
        .orbit-logo {
            position: fixed;
            left: 50%; top: 13vh;
            transform: translate(-50%, -50%);
            width:  calc(var(--icon-size) * 1.55);
            height: calc(var(--icon-size) * 1.55);
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            display: flex; align-items: center; justify-content: center;
            z-index: 20;
            animation: floatLogo 4s ease-in-out infinite;
        }
        .orbit-logo img {
            width: 62%; height: 62%;
            object-fit: contain;
        }

        @keyframes floatLogo {
            0%,100% { transform: translate(-50%,-50%) translateY(0px);   }
            50%      { transform: translate(-50%,-50%) translateY(-10px); }
        }

        /* ══════════════════════════════════
           SUN / MOON ORBIT  (circles the logo, swaps at night)
        ══════════════════════════════════ */
        .sky-orbit {
            position: fixed;
            left: 50%; top: 13vh;
            transform: translate(-50%, -50%);
            width:  calc(var(--icon-size) * 3.4);
            height: calc(var(--icon-size) * 3.4);
            z-index: 15;
            pointer-events: none;
            animation: orbitSpin 16s linear infinite;
        }
        .sky-icon {
            position: absolute;
            top: 0; left: 50%;
            width: 30px; height: 30px;
            transform: translate(-50%, -50%);
        }
        .sky-icon .sun,
        .sky-icon .moon {
            position: absolute; inset: 0;
            border-radius: 50%;
            transition: opacity 0.8s ease;
        }
        .sky-icon .sun {
            background: radial-gradient(circle at 35% 32%, #fff6c8, #ffd93d 55%, #ff9a2e 100%);
            box-shadow: 0 0 18px 6px rgba(255,214,61,0.65);
            opacity: 1;
        }
        .sky-icon .moon {
            background: radial-gradient(circle at 32% 30%, #f4f6ff, #cdd6e8 55%, #8f9bbd 100%);
            box-shadow: 0 0 16px 5px rgba(200,210,255,0.55);
            opacity: 0;
        }
        html.dark-theme .sky-icon .sun  { opacity: 0; }
        html.dark-theme .sky-icon .moon { opacity: 1; }

        @keyframes orbitSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ══════════════════════════════════
           GAME MENU  (page 1 — vertical, top-mid over the model)
        ══════════════════════════════════ */
        .game-menu {
            position: fixed;
            top: 34vh; left: 50%;
            transform: translate(-50%, 0);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 25;
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        html.is-home .game-menu {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -24px);
        }
        .menu-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            color: #FFD93D;
            text-shadow: 0 0 1px rgba(0,0,0,0.65), 0 2px 3px rgba(0,0,0,0.35);
            font-family: 'Danfo', cursive;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.25s ease;
        }
        .menu-btn:hover { color: #4CAF50; transform: translateY(-3px) scale(1.05); }
        .menu-btn.model-btn { font-size: 1.6rem; margin-bottom: 6px; }

        /* ══════════════════════════════════
           SOCIAL BUTTON ROW  (page 2 — bottom-center, above footer)
        ══════════════════════════════════ */
        .social-row {
            position: fixed;
            bottom: 78px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        html.is-home .social-row {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            background: none;
            border: none;
            color: #FFD93D;
            text-shadow: 0 0 1px rgba(0,0,0,0.65), 0 2px 3px rgba(0,0,0,0.35);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.25s ease;
        }
        .social-btn i { font-size: 1.05rem; }
        .social-btn:hover {
            color: #4CAF50;
            transform: translateY(-3px);
        }

        /* ══════════════════════════════════
           CLOUDS  (white by day, glowing yellow by night)
        ══════════════════════════════════ */
        .clouds {
            position: fixed;
            inset: auto 0 0 0;
            height: 20vh;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            bottom: -18px;
            background: #FFFFFF;
            border-radius: 60px;
            opacity: 0.95;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            transition: background 0.8s ease, box-shadow 0.8s ease;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            transition: background 0.8s ease;
        }
        html.dark-theme .cloud {
            background: #FFD93D;
            opacity: 0.9;
            box-shadow: 0 0 22px 4px rgba(255,217,61,0.5);
        }
        html.dark-theme .cloud::before,
        html.dark-theme .cloud::after {
            background: #FFD93D;
        }
        .cloud-1 {
            left: -4%; width: 220px; height: 78px;
            animation: driftCloud 34s ease-in-out infinite;
        }
        .cloud-1::before { width: 110px; height: 110px; left: 10px;  top: -55px; }
        .cloud-1::after  { width: 90px;  height: 90px;  right: 20px; top: -45px; }

        .cloud-2 {
            left: 28%; width: 170px; height: 62px; bottom: -26px;
            animation: driftCloud 26s ease-in-out infinite reverse;
        }
        .cloud-2::before { width: 85px; height: 85px; left: 12px;  top: -42px; }
        .cloud-2::after  { width: 70px; height: 70px; right: 16px; top: -34px; }

        .cloud-3 {
            left: 60%; width: 250px; height: 86px; bottom: -10px;
            animation: driftCloud 40s ease-in-out infinite;
        }
        .cloud-3::before { width: 120px; height: 120px; left: 18px;  top: -60px; }
        .cloud-3::after  { width: 100px; height: 100px; right: 24px; top: -50px; }

        @keyframes driftCloud {
            0%,100% { transform: translateX(0); }
            50%     { transform: translateX(28px); }
        }

        /* ══════════════════════════════════
           FOOTER
        ══════════════════════════════════ */
        .footer-tag {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        .footer-link {
            font-size: 0.62rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #FFD93D;
            text-shadow: 0 0 1px rgba(0,0,0,0.65), 0 1px 2px rgba(0,0,0,0.35);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-link:hover { color: #4CAF50; }

        /* ══════════════════════════════════
           MOBILE — portrait
        ══════════════════════════════════ */
        @media (max-width: 600px) {
            :root { --icon-size: clamp(50px, 14vw, 66px); }
            .orbit-logo   { top: 10vh; }
            .game-menu    { top: 30vh; gap: 12px; }
            .menu-btn     { font-size: 1.05rem; }
            .menu-btn.model-btn { font-size: 1.3rem; }
            .social-row   { bottom: 70px; gap: 10px; }
            .social-btn   { padding: 0.65rem 1rem; font-size: 0.72rem; }
        }

        /* ══════════════════════════════════
           MOBILE — landscape
        ══════════════════════════════════ */
        @media (max-height: 500px) and (orientation: landscape) {
            :root { --icon-size: clamp(42px, 8vmin, 58px); }
            .orbit-logo  { top: 12vh; }
            .game-menu   { top: 26vh; gap: 8px; }
            .menu-btn    { font-size: 0.9rem; }
            .menu-btn.model-btn { font-size: 1.1rem; }
            .social-row  { bottom: 46px; gap: 8px; }
            .social-btn  { padding: 0.5rem 0.85rem; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <!-- 3D model, centered -->
    <canvas id="threeCanvas"></canvas>

    <!-- ── Logo ── -->
    <div class="orbit-logo">
        <img src="https://i.postimg.cc/65KGqwDQ/IMG-1999-removebg-preview.png" alt="bdrspen">
    </div>

    <!-- ── Sun/Moon orbiting the logo ── -->
    <div class="sky-orbit">
        <div class="sky-icon">
            <div class="sun"></div>
            <div class="moon"></div>
        </div>
    </div>

    <!-- ── Page 1: game-style menu, top-mid over the model ── -->
    <div class="game-menu">
        <button class="menu-btn model-btn" onclick="showModel()">
            <i class="fa-solid fa-cube"></i>
            <span>3D Model</span>
        </button>

        <a href="https://www.instagram.com/bdrspen/" class="menu-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>

        <a href="https://www.pinterest.com/bdrspen/" class="menu-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-pinterest"></i>
            <span>Pinterest</span>
        </a>

        <a href="https://www.tiktok.com/@bdrs_pen" class="menu-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>

        <a href="https://www.instagram.com/block4kw/" class="menu-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            <span>Block4kw</span>
        </a>
    </div>

    <!-- ── Page 2: social row above the footer, model zoomed to corner ── -->
    <div class="social-row">
        <button class="social-btn" onclick="hideModel()">
            <i class="fa-solid fa-cube"></i>
            <span>3D Model</span>
        </button>

        <a href="https://www.instagram.com/bdrspen/" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>

        <a href="https://www.pinterest.com/bdrspen/" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-pinterest"></i>
            <span>Pinterest</span>
        </a>

        <a href="https://www.tiktok.com/@bdrs_pen" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>

        <a href="https://www.instagram.com/block4kw/" class="social-btn"
           target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            <span>Block4kw</span>
        </a>
    </div>

    <footer class="footer-tag">
        <a href="mailto:workido997@gmail.com" class="footer-link">
            bader's p 2026 &middot; contact me here
        </a>
    </footer>

    <!-- Clouds -->
    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <!-- Day / night theme check -->
    <script>
        function applyTimeTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.documentElement.classList.toggle('dark-theme', isNight);
        }
        applyTimeTheme();
        setInterval(applyTimeTheme, 60000);
    </script>

    <!-- Page toggle: aside model <-> centered model + menu -->
    <script>
        function showModel() { document.documentElement.classList.add('is-home'); }
        function hideModel() { document.documentElement.classList.remove('is-home'); }
    </script>

    <!-- ══════════════════════════════════════════════════
         THREE.JS  —  Blender model, centered
    ══════════════════════════════════════════════════ -->
    <script type="module">
        import * as THREE          from 'three';
        import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const canvas   = document.getElementById('threeCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.toneMapping         = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();

        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
        pmrem.dispose();

        const camera = new THREE.PerspectiveCamera(
            45, window.innerWidth / window.innerHeight, 0.1, 2000
        );
        camera.position.z = window.innerWidth < window.innerHeight ? 10 : 7;

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping   = true;
        controls.dampingFactor   = 0.04;
        controls.autoRotate      = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableZoom      = true;
        controls.minDistance     = 2.2;
        controls.maxDistance     = 18;
        controls.enablePan       = false;
        controls.touches         = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_ROTATE
        };

        let resumeTimer;
        controls.addEventListener('start', () => {
            controls.autoRotate = false;
            clearTimeout(resumeTimer);
        });
        controls.addEventListener('end', () => {
            resumeTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });

        const clock = new THREE.Clock();
        let mixer   = null;

        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            'https://raw.githubusercontent.com/bdrspen/bdrsssets/main/p1.glb',
            ({ scene: model, animations }) => {
                const box    = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);
                model.scale.setScalar(3.4 / Math.max(size.x, size.y, size.z));

                model.traverse(child => {
                    if (child.isMesh && child.material) {
                        const mats = Array.isArray(child.material)
                            ? child.material : [child.material];
                        mats.forEach(m => {
                            if (m.emissive && m.emissive.r + m.emissive.g + m.emissive.b > 0.01) {
                                m.emissiveIntensity = Math.min(m.emissiveIntensity * 2, 3);
                            }
                        });
                    }
                });

                scene.add(model);

                if (animations && animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    animations.forEach(clip => {
                        mixer.clipAction(clip).play();
                    });
                }
            },
            undefined,
            err => console.error('GLTF load error:', err)
        );

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>

</body>
</html>
